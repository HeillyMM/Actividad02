<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen pb-10">
    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <a href="/" class="text-2xl font-bold gradient-text">EventFlow</a>
        {% if session.user %}
        <div class="flex items-center gap-6">
            <span class="text-sm text-slate-400">@{{ session.user }}</span>
            <a href="/logout" class="text-sm font-medium text-red-400 hover:text-red-300">Cerrar Sesión</a>
        </div>
        {% endif %}
    </nav>
    <main class="max-w-6xl mx-auto px-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
