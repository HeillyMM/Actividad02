{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto mt-20 glass p-10 rounded-3xl shadow-2xl text-center">
    <h2 class="text-3xl font-bold mb-8">Bienvenido de <span class="gradient-text">Nuevo</span></h2>
    <form method="POST" class="space-y-4">
        <input type="text" name="username" placeholder="Usuario" class="w-full p-4 rounded-xl bg-slate-800/50 border border-slate-700 text-white outline-none focus:ring-2 focus:ring-indigo-500" required>
        <input type="password" name="password" placeholder="Contraseña" class="w-full p-4 rounded-xl bg-slate-800/50 border border-slate-700 text-white outline-none focus:ring-2 focus:ring-indigo-500" required>
        <button class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold shadow-lg transition-all">Entrar</button>
    </form>
    <p class="mt-6 text-sm text-slate-400">¿No tienes cuenta? <a href="/register" class="text-indigo-400 font-bold hover:underline">Regístrate</a></p>
</div>
{% endblock %}
