{% extends 'base.html' %}
{% block content %}
<div class="max-w-xl mx-auto mt-10">
    <div class="glass rounded-3xl p-10 shadow-2xl">
        <div class="mb-8 text-center">
            <span class="text-xs font-black uppercase tracking-widest text-indigo-400">Confirmar Asistencia</span>
            <h2 class="text-3xl font-extrabold mt-2 text-white">{{evento.nombre}}</h2>
            <p class="text-slate-400 text-sm mt-2">{{evento.fecha}} a las {{evento.hora}}</p>
        </div>

        <form action="/guardar_inscripcion/{{evento.id}}" method="POST" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Nombre para la lista</label>
                <input type="text" name="nombre" value="{{ session.user }}"
                    class="w-full bg-slate-800/50 border border-slate-700 text-white px-6 py-4 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none" required>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Tu Correo</label>
                <input type="email" name="email" value="{{ session.email }}"
                    class="w-full bg-slate-800/50 border border-slate-700 text-white px-6 py-4 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none" required>
            </div>

            <button type="submit" class="w-full py-5 rounded-2xl font-black text-white uppercase bg-indigo-600 hover:bg-indigo-500 shadow-xl transition-all">
                Confirmar mi lugar
            </button>
            <a href="/" class="block text-center mt-6 text-sm text-slate-500 hover:text-indigo-400">← Volver</a>
        </form>
    </div>
</div>
{% endblock %}
